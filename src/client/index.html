<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmVibes.AI - GeoAI Interactive Segmentation</title>
    <!-- YSH Precision Architect Styling -->
    <style>
        :root {
            --zinc-50: #F9F9FB;
            --zinc-900: #18181B;
            --zinc-950: #09090B;
            --whatsapp-green: #25D366;
            --blue-500: #3B82F6;
        }
        body {
            background-color: var(--zinc-950);
            color: var(--zinc-50);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            background-color: var(--zinc-900);
            padding: 20px;
            border-radius: 8px;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-loading { background-color: var(--blue-500); }
        .status-ready { background-color: var(--whatsapp-green); }
        
        #map-container {
            width: 100%;
            height: 600px;
            background-color: #000;
            margin-top: 20px;
            border-radius: 4px;
        }
    </style>
    <!-- Import Transformers.js and GeoAI -->
    <script type="module">
        import { env, pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        import { GeoAI } from './geoai.js';
        
        // Disable local models, fetch from HuggingFace
        env.allowLocalModels = false;

        const geoai = new GeoAI();

        async function initModel() {
            const statusText = document.getElementById('status-text');
            const statusDot = document.getElementById('status-dot');
            try {
                // Initialize a mock vision model pipeline for SAM
                statusText.innerText = "Loading GeoAI.js and Transformers.js Models...";
                statusDot.className = "status-indicator status-loading";
                
                // Simulate loading delay for the mock
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                statusText.innerText = "Models Ready. Interactive Segmentation Active.";
                statusDot.className = "status-indicator status-ready";
            } catch (error) {
                console.error("Error loading models:", error);
                statusText.innerText = "Error Loading Models.";
                statusDot.style.backgroundColor = "#EF4444";
            }
        }
        
        document.addEventListener("DOMContentLoaded", initModel);
        
        window.geoai = geoai; // Expose for UI scripts
    </script>
</head>
<body>
    <div class="container">
        <h1>FarmVibes.AI Segmentation</h1>
        <div>
            <span id="status-dot" class="status-indicator status-loading"></span>
            <span id="status-text">Initializing Engine...</span>
        </div>
        
        <div class="toolbar" style="margin-top: 20px; display: flex; gap: 10px;">
            <button id="add-point-btn" style="background: var(--blue-500); color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer;">Add Prompt Point</button>
            <button id="segment-btn" style="background: linear-gradient(90deg, #FFCE00 0%, #FF6600 50%, #FF0066 100%); color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">Run Segmentation</button>
            <button id="clear-btn" style="background: #333; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer;">Clear All</button>
        </div>
        
        <div id="map-container" style="position: relative; overflow: hidden; cursor: crosshair;">
            <!-- Placeholder for map -->
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #666;">Map View Area</div>
        </div>

        <script>
            // Mocking the UI interactions
            const mapContainer = document.getElementById('map-container');
            const addPointBtn = document.getElementById('add-point-btn');
            const segmentBtn = document.getElementById('segment-btn');
            const clearBtn = document.getElementById('clear-btn');
            const points = [];

            let isAddingPoint = false;

            // Mock connecting to backend tile data
            async function loadTiles() {
                try {
                    // Simulate fetching tile from FarmVibes.AI API
                    await new Promise(r => setTimeout(r, 500));
                    mapContainer.style.backgroundColor = '#1a1a1a';
                    mapContainer.style.backgroundImage = 'radial-gradient(#333 1px, transparent 1px)';
                    mapContainer.style.backgroundSize = '20px 20px';
                    mapContainer.innerHTML = '<div style="position: absolute; top: 10px; left: 10px; color: var(--whatsapp-green); font-family: monospace; font-size: 12px;">Connected to Tile Server: XYZ (Mock)</div>';
                } catch (e) {
                    console.error("Failed to load tiles");
                }
            }

            addPointBtn.addEventListener('click', () => {
                isAddingPoint = true;
                addPointBtn.style.backgroundColor = 'var(--whatsapp-green)';
            });

            mapContainer.addEventListener('click', (e) => {
                if (!isAddingPoint) return;
                
                const rect = mapContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                points.push({x, y});
                
                const dot = document.createElement('div');
                dot.className = 'prompt-dot';
                dot.style.position = 'absolute';
                dot.style.left = `${x - 5}px`;
                dot.style.top = `${y - 5}px`;
                dot.style.width = '10px';
                dot.style.height = '10px';
                dot.style.backgroundColor = 'var(--blue-500)';
                dot.style.borderRadius = '50%';
                mapContainer.appendChild(dot);
                
                isAddingPoint = false;
                addPointBtn.style.backgroundColor = 'var(--blue-500)';
            });

            segmentBtn.addEventListener('click', async () => {
                if (points.length === 0) {
                    alert("Please add at least one prompt point.");
                    return;
                }
                
                segmentBtn.innerText = "Running...";
                
                // Use GeoAI instance from module scope
                const mask = await window.geoai.getSegmentationMask(points, "mock_image_url");
                
                const rect = document.createElement('div');
                rect.className = 'segment-mask';
                rect.style.position = 'absolute';
                rect.style.left = `${mask.coordinates[0].x - 50}px`;
                rect.style.top = `${mask.coordinates[0].y - 50}px`;
                rect.style.width = '100px';
                rect.style.height = '100px';
                rect.style.backgroundColor = 'rgba(37, 211, 102, 0.4)';
                rect.style.border = '2px solid var(--whatsapp-green)';
                mapContainer.appendChild(rect);
                
                segmentBtn.innerText = "Run Segmentation";
            });

            clearBtn.addEventListener('click', () => {
                const dots = document.querySelectorAll('.prompt-dot, .segment-mask');
                dots.forEach(d => d.remove());
                points.length = 0;
            });
            
            // Auto-load tiles on start
            loadTiles();
        </script>
    </div>
</body>
</html>
